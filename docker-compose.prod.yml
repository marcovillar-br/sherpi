services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${SHERPI_DB_USER:-sherpi}
      POSTGRES_PASSWORD: ${SHERPI_DB_PASSWORD}
      POSTGRES_DB: sherpi
    volumes:
      - sherpi_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sherpi -d sherpi"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    env_file: .env.prod
    environment:
      SHERPI_ENV: prod
      SHERPI_DATABASE_URL: postgresql+psycopg://${SHERPI_DB_USER:-sherpi}:${SHERPI_DB_PASSWORD}@db:5432/sherpi
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sherpi_pgdata_prod:
