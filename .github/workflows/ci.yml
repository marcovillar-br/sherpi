name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Sync deps
        run: uv sync --dev
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Type check (mypy)
        run: uv run mypy src/ evals/
      - name: Tests
        run: uv run pytest -q
      - name: Eval gate
        run: uv run python -m evals.run --ci
      - name: Supply-chain audit
        run: uv run pip-audit || true  # não bloqueia o MVP; falha vira gate na Fase 4

  # O job de frontend é adicionado na Sprint 2, junto do scaffold do Next.js
  # (ver docs/roadmap.md). Enquanto frontend/ não existir, o job ficaria sem
  # diretório de trabalho e falharia — por isso está desativado.
